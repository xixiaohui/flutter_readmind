name: flutter_readmind
description: ReadMeet Quotes - Read. Highlight. Share.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.1.3

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.1
  path: ^1.8.3
  shared_preferences: ^2.3.2

  # Network & Connectivity
  connectivity_plus: ^6.1.0

  # File Import
  file_picker: ^10.1.0

  # EPUB Reader
  epub_view: ^3.2.0

  # PDF Reader
  pdfx: ^2.5.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Sharing & Export
  share_plus: ^10.1.2
  screenshot: ^3.0.0
  gal: ^2.3.0

  # Monetization
  in_app_purchase: ^3.1.7

  # Firebase (Analytics & Crashlytics)
  firebase_core: ^3.8.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.6
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/i18n/

  # Localizations
  generate: true
